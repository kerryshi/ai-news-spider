name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  engine:
    name: Engine tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest

  extension:
    name: Extension build (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: extension
        run: npm install
      - working-directory: extension
        run: npm run compile
