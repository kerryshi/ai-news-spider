name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: the default GITHUB_TOKEN is read-only unless a job opts up.
permissions:
  contents: read

jobs:
  engine:
    name: Engine tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest

  extension:
    name: Extension build (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: extension
        # `npm ci` installs from the committed lockfile; `--ignore-scripts` blocks a
        # malicious/typosquatted dependency's lifecycle scripts from running on the
        # runner (a tsc build needs no dependency install-scripts).
        run: npm ci --ignore-scripts
      - working-directory: extension
        run: npm run compile
