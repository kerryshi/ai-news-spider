name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: the default GITHUB_TOKEN is read-only unless a job opts up.
permissions:
  contents: read

jobs:
  engine:
    name: Engine tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements*.txt
      # The banner-collision regression in test_collect_health.py drives the COMPILED
      # extension through node (out/extension.js is gitignored), so this job compiles
      # it first. Same --ignore-scripts hygiene as the extension job.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - working-directory: extension
        run: npm ci --ignore-scripts
      - working-directory: extension
        run: npm run compile
      - run: pip install -r requirements-dev.txt
      # Lint gate (blocking): the tree linted clean before this step landed, so any
      # finding here is a regression, not noise.
      - run: ruff check .
      - run: python -m pytest

  extension:
    name: Extension build (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - working-directory: extension
        # `npm ci` installs from the committed lockfile; `--ignore-scripts` blocks a
        # malicious/typosquatted dependency's lifecycle scripts from running on the
        # runner (a tsc build needs no dependency install-scripts).
        run: npm ci --ignore-scripts
      - working-directory: extension
        run: npm run compile
