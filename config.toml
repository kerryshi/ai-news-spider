# ── AI early-signal scraper config ───────────────────────────────────────────
# Edit freely. Everything here is read at runtime; no code changes needed.

[general]
# Max publish-age to KEEP an item (hours). Generous, because arXiv papers / GitHub
# repos / HF models have older publish dates than HN/Reddit posts — recency for
# ranking is judged by when WE first saw it, not the publish date. 336h = 14 days.
max_age_hours = 336
# Max items to keep in the final digest.
digest_size = 25
# Where the markdown digest is written (relative to project root).
digest_path = "digests"

[ollama]
# localhost by default (works for a desktop run). The Jetson deploy rewrites this to
# your desktop's LAN address via the OLLAMA_LAN_HOST env var (see scripts/deploy.ps1).
host = "http://localhost:11434"
chat_model = "llama3.1:8b"        # relevance + earliness judging
embed_model = "nomic-embed-text"  # novelty / dedup
# Skip the LLM scoring step (faster, less precise) by setting to false.
use_llm_scoring = true
# Per-call cap (seconds) for the on-demand readable-summary request, so a single
# slow/hung llama3.1 call can't stall the whole `top` digest. Other calls use the
# 60s client default.
summary_timeout_s = 20

[relevance]
# The LLM scores each item against this description of what you care about.
focus = """
Frontier / emerging AI technology: new model architectures, open-weight model
releases, agent frameworks, inference + training techniques, novel research,
tooling and infrastructure. Prefer technical, builder-relevant signal.
"""
# Hard keyword prefilter (case-insensitive). An item must match >=1 to survive
# the cheap prefilter before it ever reaches the LLM. Keep broad.
keywords = [
  "ai", "llm", "agent", "model", "transformer", "diffusion", "rag",
  "fine-tun", "inference", "quantiz", "embedding", "neural", "gpt",
  "open-weight", "open weight", "multimodal", "reasoning", "benchmark",
]

[novelty]
# Cosine-similarity threshold against previously surfaced items.
# Items more similar than this to something already shown are treated as stale.
similarity_threshold = 0.86

[collector]
# The collector runs constantly (systemd timer on the Jetson), accumulating items.
# Drop items not seen for this many days to bound the corpus + novelty comparisons.
retention_days = 14

[ranking]
# Ranking happens on demand (`top`). Score = weighted components × freshness decay.
halflife_hours = 18        # freshness: score halves every N hours of age (lower = fresher bias)
weight_velocity = 0.30     # engagement gained per hour (real slope across snapshots)
weight_novelty = 0.20      # 1 - similarity to the rest of the corpus
weight_relevance = 0.25    # LLM fit to [relevance].focus
weight_earliness = 0.15    # LLM "how pre-mainstream"
weight_query = 0.30        # topic similarity, only when `top --query` is used
default_top_n = 20
default_since_hours = 72    # only rank items first published within this window
# Only the top N shown items get an on-demand readable LLM "What it is —" summary;
# lower-ranked items fall back to the earliness reason / source abstract. Bounds the
# cold-load latency of a `top` click to ~N serial llama3.1 calls instead of default_top_n.
summary_top_n = 8

[suppression]
# Topics already covered by these domains are downranked as "already broke".
mainstream_domains = [
  "techcrunch.com", "theverge.com", "wired.com", "nytimes.com",
  "wsj.com", "bloomberg.com", "cnbc.com", "forbes.com", "reuters.com",
  "venturebeat.com", "businessinsider.com", "arstechnica.com",
]
# Score multiplier applied to items pointing at a mainstream domain.
penalty = 0.5

# ── Sources ──────────────────────────────────────────────────────────────────
# NOTE (2026-06-27): source breadth widened to attack the net-new bottleneck.
# The collector re-polls the same recency-sorted feeds every 20 min, so ~99.5% of
# each fetch was already in the corpus and net-new ran ~8/hr. Raising per-source
# caps does NOT help (recency-sorted feeds just re-serve older seen items); reaching
# DIFFERENT slices of the universe does. So: more subreddits, more HN queries, more
# arXiv categories. arXiv max_results raised because its once-daily batch (300-600
# papers in cs.*) was being truncated at 100. Caps + novelty threshold left alone.

[sources.arxiv]
enabled = true
# Broadened beyond core ML/NLP/CV into IR (RAG/retrieval), RO (embodied agents),
# SE (AI-for-code), CR (AI security), SD/eess.AS (audio/speech models).
categories = ["cs.LG", "cs.AI", "cs.CL", "cs.MA", "cs.CV", "cs.NE", "stat.ML",
              "cs.IR", "cs.RO", "cs.SE", "cs.CR", "cs.SD", "eess.AS"]
# Raised 100 -> 250: arXiv announces once/day in a large batch; 100 truncated it,
# silently dropping genuinely-new papers right after the daily announce.
max_results = 250

[sources.hackernews]
enabled = true
# One full-text query per term (Algolia isn't boolean); results are merged.
# Widened with model-family + tooling terms to reach distinct rising stories.
queries = ["AI", "LLM", "language model", "AI agent", "open weights", "fine-tuning",
           "diffusion model", "RAG", "inference", "transformer", "multimodal",
           "agentic", "GPT", "vector database", "embeddings", "open source AI",
           "machine learning", "neural network", "vLLM", "quantization",
           "Claude AI", "Mistral", "reasoning model", "Llama"]
max_results = 40        # per query
min_points = 2

[sources.reddit]
enabled = true
# Widened from 9 -> 21 communities. Bad/empty sub names simply no-op (the adapter
# catches the 404 and continues), so over-including costs nothing.
subreddits = ["LocalLLaMA", "MachineLearning", "singularity", "LLMDevs",
              "artificial", "OpenAI", "StableDiffusion", "AI_Agents", "LocalLLM",
              "deeplearning", "computervision", "LanguageTechnology", "MLQuestions",
              "ClaudeAI", "ollama", "mcp", "ArtificialInteligence", "AgentsOfAI",
              "OpenSourceAI", "GPT3", "aiagents", "voiceai"]
listing = "new"          # new | hot | rising
limit_per_sub = 40
request_delay = 0.8      # seconds between sub fetches (Reddit 429s rapid bursts)
max_retries = 1          # 1 backoff retry/sub: Reddit's throttle is IP-wide, so
                         # chasing all subs per cycle is costly; ~2-4 land each run
                         # and coverage rotates across the 20-min cycles instead.

[sources.github]
enabled = true
# Searched as: created:>{recent} stars:>=min_stars (topic OR topic ...)
# Kept at 10 topics: unauthenticated GitHub search is ~10 req/min, one req/topic.
# Set GITHUB_TOKEN to go wider. max_results raised so per_topic (=max/len) stays ~15.
topics = ["llm", "ai-agents", "machine-learning", "generative-ai", "rag",
          "transformers", "diffusion-models", "llmops", "deep-learning", "nlp"]
min_stars = 8
max_results = 150
# Optional: set the GITHUB_TOKEN env var to raise the rate limit (10/hr -> 30/min).

[sources.huggingface]
enabled = true
# Pulls trending models and the daily papers feed.
models_limit = 80
include_daily_papers = true

[sources.lobsters]
enabled = true
# lobste.rs tag feeds (HN-like community, strong early dev/AI signal).
tags = ["ai", "ml"]
min_score = 1
